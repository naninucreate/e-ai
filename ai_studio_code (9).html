<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Admin - Command Center</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #020617;
            --card: #0f172a;
            --accent: #3b82f6;
            --danger: #ef4444;
            --success: #10b981;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* ログイン画面 */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
        }

        .login-box {
            background: var(--card);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--border);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        input[type="password"] {
            background: #000;
            border: 1px solid var(--border);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            width: 250px;
            font-size: 16px;
            outline: none;
            margin-bottom: 20px;
        }

        input[type="password"]:focus { border-color: var(--accent); }

        /* ヘッダー */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--border);
        }

        .status-badge {
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* ステータスグリッド */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid var(--border);
            position: relative;
        }

        .card h3 { margin: 0 0 10px 0; font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .card .val { font-size: 40px; font-weight: 900; color: var(--accent); line-height: 1; }

        /* コントロールパネル */
        .action-panel {
            background: var(--card);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid var(--border);
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
        }

        .btn-stop { background: var(--danger); color: white; }
        .btn-start { background: var(--success); color: white; }
        .btn-reset { background: #475569; color: white; }
        button:hover { transform: translateY(-3px); filter: brightness(1.1); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        button:active { transform: translateY(0); }

        /* ログテーブル */
        .log-section { background: var(--card); border-radius: 15px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
        th { background: rgba(0,0,0,0.2); color: var(--text-dim); font-size: 11px; text-transform: uppercase; }
        .time-cell { font-family: monospace; }
        .del-btn { color: var(--danger); cursor: pointer; font-weight: bold; }
        .del-btn:hover { text-decoration: underline; }

        .old-log { opacity: 0.4; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="margin-top:0;">ADMIN ACCESS</h2>
        <p style="color:var(--text-dim); font-size:13px;">パスワードを入力してください</p>
        <input type="password" id="admin-pass" placeholder="Password"><br>
        <button class="btn-start" onclick="checkAuth()">LOGIN</button>
    </div>
</div>

<div class="container" id="admin-content" style="display:none;">
    <div class="header">
        <div>
            <h1 style="margin:0; font-size: 1.5rem;">Admin Panel</h1>
            <p style="margin:5px 0 0 0; color:var(--text-dim); font-size:12px;">Gemini Shared Limit Controller</p>
        </div>
        <div id="connection-status" class="status-badge" style="background:var(--success);">Online</div>
    </div>

    <div class="grid">
        <div class="card">
            <h3>Global RPM (Last 60s)</h3>
            <div id="rpm-val" class="val">0</div>
        </div>
        <div class="card">
            <h3>App Availability</h3>
            <div id="app-status-text" class="val" style="font-size: 28px;">ACTIVE</div>
        </div>
    </div>

    <div class="action-panel">
        <button id="lock-btn" class="btn-stop" onclick="toggleLock()">緊急停止 (LOCK APP)</button>
        <button class="btn-reset" onclick="resetAllLogs()">制限リセット (CLEAR ALL)</button>
    </div>

    <div class="log-section">
        <div style="padding: 15px; font-weight: bold; border-bottom: 1px solid var(--border);">Real-time Activity Logs</div>
        <table id="log-table">
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Request ID</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    // --- Firebase 設定 ---
    const firebaseConfig = {
        databaseURL: "https://gemini-ai-api-seigen-default-rtdb.firebaseio.com/",
        projectId: "gemini-ai-api-seigen"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const logsRef = db.ref('global_limit/logs');
    const statusRef = db.ref('global_limit/status');

    let isLocked = false;

    // パスワードチェック
    function checkAuth() {
        const pass = document.getElementById('admin-pass').value;
        if (pass === "admin123") { // デフォルトパスワード
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
            startMonitoring();
        } else {
            alert("パスワードが違います");
        }
    }

    function startMonitoring() {
        // ロック状態のリアルタイム監視
        statusRef.on('value', snap => {
            const data = snap.val();
            isLocked = data ? data.isLocked : false;
            updateLockUI();
        });

        // 送信ログのリアルタイム監視
        logsRef.on('value', snap => {
            const data = snap.val();
            const logsArray = data ? Object.entries(data) : [];
            updateLogsUI(logsArray);
        });
    }

    function updateLockUI() {
        const btn = document.getElementById('lock-btn');
        const statusText = document.getElementById('app-status-text');
        
        if (isLocked) {
            btn.innerText = "利用を再開させる (UNLOCK)";
            btn.className = "btn-start";
            statusText.innerText = "LOCKED";
            statusText.style.color = "var(--danger)";
        } else {
            btn.innerText = "緊急停止 (LOCK APP)";
            btn.className = "btn-stop";
            statusText.innerText = "ACTIVE";
            statusText.style.color = "var(--success)";
        }
    }

    function updateLogsUI(logs) {
        const now = Date.now();
        const activeCount = logs.filter(item => now - item[1] < 60000).length;
        document.getElementById('rpm-val').innerText = activeCount;

        const tbody = document.querySelector('#log-table tbody');
        tbody.innerHTML = "";

        // 新しい順に並び替え
        logs.reverse().slice(0, 50).forEach(item => {
            const row = document.createElement('tr');
            const diff = now - item[1];
            if (diff > 60000) row.className = "old-log";
            
            const time = new Date(item[1]).toLocaleTimeString('ja-JP');
            row.innerHTML = `
                <td class="time-cell">${time}</td>
                <td style="font-size:10px; color:var(--text-dim);">${item[0]}</td>
                <td><span class="del-btn" onclick="deleteEntry('${item[0]}')">Delete</span></td>
            `;
            tbody.appendChild(row);
        });
    }

    // 利用禁止・解除の切り替え
    function toggleLock() {
        statusRef.set({ isLocked: !isLocked });
    }

    // 履歴をすべて消去（制限を即時リセット）
    function resetAllLogs() {
        if (confirm("全ての履歴を消去して制限をリセットしますか？チャット利用者の送信回数が0に戻ります。")) {
            logsRef.remove();
        }
    }

    // 個別の履歴を削除
    function deleteEntry(id) {
        db.ref('global_limit/logs/' + id).remove();
    }
</script>

</body>
</html>
