<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Gemini Admin - Command Center</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #3b82f6; --danger: #ef4444; --success: #10b981; --text: #f8fafc; --border: rgba(255, 255, 255, 0.1); }
        body { font-family: sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 1100px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--border); }
        .val { font-size: 36px; font-weight: bold; color: var(--accent); }
        .controls { display: flex; gap: 10px; margin-top: 15px; }
        button { padding: 10px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-lock { background: var(--danger); color: white; }
        .btn-unlock { background: var(--success); color: white; }
        .btn-clear { background: #475569; color: white; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 15px; overflow: hidden; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
        th { background: rgba(0,0,0,0.3); color: #94a3b8; text-transform: uppercase; font-size: 11px; }
        .role-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .role-user { background: #1e40af; color: white; }
        .role-ai { background: #374151; color: #38bdf8; }
        .msg-content { white-space: pre-wrap; font-size: 13px; color: #cbd5e1; max-height: 80px; overflow-y: auto; }
        #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; margin-bottom: 15px; width: 250px; text-align: center; }
    </style>
</head>
<body>
<div id="login-overlay">
    <h2>ADMIN ACCESS</h2>
    <input type="password" id="admin-pass" placeholder="Password (admin123)">
    <button class="btn-unlock" onclick="checkAuth()">LOGIN</button>
</div>
<div class="container" id="admin-content" style="display:none;">
    <div class="header">
        <h1>Global Monitor</h1>
        <div id="conn-status" style="color:var(--success)">● System Online</div>
    </div>
    <div class="grid">
        <div class="card"><h3>Global RPM (Active Users)</h3><div id="rpm-val" class="val">0</div></div>
        <div class="card"><h3>Quick Controls</h3>
            <div class="controls">
                <button id="lock-toggle" onclick="toggleLock()">Loading...</button>
                <button class="btn-clear" onclick="clearLogs()">Clear All Logs</button>
            </div>
        </div>
    </div>
    <table>
        <thead><tr><th width="100">Time</th><th width="80">Role</th><th>Message</th><th width="60">Action</th></tr></thead>
        <tbody id="log-body"></tbody>
    </table>
</div>
<script>
    const firebaseConfig = { databaseURL: "https://gemini-ai-api-seigen-default-rtdb.firebaseio.com/", projectId: "gemini-ai-api-seigen" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const logsRef = db.ref('global_limit/logs');
    const statusRef = db.ref('global_limit/status');
    let isLocked = false;

    function checkAuth() {
        if (document.getElementById('admin-pass').value === "admin123") {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
            startAdmin();
        } else { alert("Pass Error"); }
    }

    function startAdmin() {
        statusRef.on('value', s => {
            isLocked = s.val()?.isLocked || false;
            const btn = document.getElementById('lock-toggle');
            btn.innerText = isLocked ? "UNLOCK APP" : "LOCK APP";
            btn.className = isLocked ? "btn-unlock" : "btn-lock";
        });
        logsRef.on('value', s => {
            const data = s.val();
            const list = data ? Object.entries(data).reverse() : [];
            updateUI(list);
        });
    }

    function updateUI(list) {
        const now = Date.now();
        document.getElementById('rpm-val').innerText = list.filter(item => item[1].role === 'user' && now - item[1].timestamp < 60000).length;
        const tbody = document.getElementById('log-body');
        tbody.innerHTML = "";
        list.slice(0, 50).forEach(([id, obj]) => {
            const row = document.createElement('tr');
            const time = new Date(obj.timestamp).toLocaleTimeString();
            row.innerHTML = `
                <td>${time}</td>
                <td><span class="role-badge ${obj.role === 'user' ? 'role-user' : 'role-ai'}">${obj.role.toUpperCase()}</span></td>
                <td><div class="msg-content">${obj.text || ''}</div></td>
                <td><button onclick="deleteLog('${id}')" style="background:none; color:var(--danger); cursor:pointer; padding:0;">Del</button></td>
            `;
            tbody.appendChild(row);
        });
    }

    function toggleLock() { statusRef.set({ isLocked: !isLocked }); }
    function clearLogs() { if(confirm("Reset all user counts and history?")) logsRef.remove(); }
    function deleteLog(id) { db.ref('global_limit/logs/' + id).remove(); }
</script>
</body>
</html>
